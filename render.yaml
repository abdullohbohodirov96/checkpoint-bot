# Render.com deployment configuration
services:
  - type: worker
    name: checkpoint-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: "1282014621,82167016"
      - key: CHANNEL_ID
        value: -5175061069
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DEFAULT_RADIUS
        value: 500
