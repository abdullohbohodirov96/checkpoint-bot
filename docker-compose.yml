version: "3.9"

services:
  # ===== PostgreSQL Database =====
  db:
    image: postgres:16-alpine
    container_name: checkpoint_db
    restart: always
    environment:
      POSTGRES_DB: checkpoint_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - checkpoint_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===== Checkpoint Bot =====
  bot:
    build: .
    container_name: checkpoint_bot_app
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres123@db:5432/checkpoint_bot
    depends_on:
      db:
        condition: service_healthy

volumes:
  checkpoint_pgdata:
